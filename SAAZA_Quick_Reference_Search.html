 Direction","text":"Measuring Direction | Definitions | True North | Based on alignment to Polaris | Grid North | Based on alignment to the Central Meridian (MGRS) | Magnetic North | Based on alignment to the Earth\u2019s magnetic pole | Primary reference used for SAAZA by MMT"},{"unit":"Unit 1 \u2014 Overview & Math","slide":79,"title":"Measuring Direction","text":"Measuring Direction | Variations in magnetic declination | The difference between the True Meridian and Magnetic Meridian is called magnetic declination | In the eastern U.S., the compass needle points west of True North and in the west the needle points east of it"},{"unit":"Unit 1 \u2014 Overview & Math","slide":80,"title":"Equipment","text":"Equipment | Lensatic Compass | Accuracy is to +/- 2.25\u00b0 | Standard military issue | Clinometer | Reads 0-360\u00b0 in both 1\u00b0 increments on the bottom scale and 5\u00b0 increments on the top scale | Accuracy is  +/- 1\u00b0 | Requires use of both eyes; one sights on an object while the other reads the scale"},{"unit":"Unit 1 \u2014 Overview & Math","slide":81,"title":"Outline","text":"Outline | Mathematics | Measurement | Direction | Distance | Review | Summary"},{"unit":"Unit 1 \u2014 Overview & Math","slide":82,"title":"Measuring Distance","text":"Measuring Distance | Distance measuring procedures | When conducting a survey we should concern ourselves with a 5 NM radius | This 5 NM radius should note possible hazards to flight from obstacles on the ground (towers, mountains) and in the air (overlapping air space) | Time, equipment, and threat will determine what is measured and the level of accuracy"},{"unit":"Unit 1 \u2014 Overview & Math","slide":83,"title":"Measuring Distance","text":"Measuring Distance | Distance measuring techniques | Odometer Readings | Pacing Method | Each person should have a number of steps that it takes to travel a certain distance | A person can either use each foot or every other foot | Requires no equipment | Can be used covertly"},{"unit":"Unit 1 \u2014 Overview & Math","slide":84,"title":"Measuring Distance","text":"Measuring Distance | Distance measuring techniques | Estimating Distances | No equipment is necessary to determine a distance | Accuracy depends on the skill of the surveyor | Estimating is quick and covert | Visual Yardstick"},{"unit":"Unit 1 \u2014 Overview & Math","slide":85,"title":"Measuring Distance","text":"Measuring Distance | Measuring Tools | Tapes | Wheels | Lasers"},{"unit":"Unit 1 \u2014 Overview & Math","slide":86,"title":"Measuring Distance","text":"Measuring Distance | Conversions need to be made while surveying | 1 Statute mile (visibility) - 5280\u2019, 1609.8 m | 1 Nautical mile - 6076\u2019, 1852 m | 1 Meter - 3.28\u2019 | Odometer: 1/10 mile - 528\u2019"},{"unit":"Unit 1 \u2014 Overview & Math","slide":87,"title":"Outline","text":"Outline | Mathematics | Measurement | Review | Summary"},{"unit":"Unit 1 \u2014 Overview & Math","slide":88,"title":"Review","text":"Review | Determine angles, distances, and horizontal ranges with trigonometric functions"},{"unit":"Unit 1 \u2014 Overview & Math","slide":89,"title":"Review","text":"Review | You are surveying a potential ALZ.  Standing at the approach end of the runway 18 overrun, you observe a tall antenna on the 035 azimuth.  Your laser range finder reads 3895m from you to the obstacle. Your clinometer reads the angle of elevation to the top of the tower as 19\u00b0 and an angle of depression to the bottom as 8\u00b0.  Your DAGR reads your elevation as 2175\u2019 MSL. | Answer the following questions: | 1. How tall is the tower? | 2. What is the slope ratio from the top of the tower to \t    \t    you? | 3. What is the MSL elevation in feet at the base of the \t    \t    tower | 4. What is the decimal and percent gradient, from the \t    \t    base of the tower to you?"},{"unit":"Unit 1 \u2014 Overview & Math","slide":90,"title":"Review","text":"Review | 1. How tall is the tower? | 3895 m | 19\u00b0 | 8\u th.  Your laser range finder read 3895m from you to the obstacle. Your clinometer read the angle of elevation to the top of the tower as 19\u00b0 and an angle of depression to the bottom as 8\u00b0.  Your DAGR reads your elevation as 2175\u2019 MSL.  Answer the following questions: | 1. How tall is the tower? | 1888.57m / 6194.51\u2019 | 2. What is the slope ratio from the top of the tower to you? | 2.9 : 1 | 3. What is the MSL elevation in feet at the base of the tower? | 380\u2019 | 4. What is the decimal and percent gradient, from the base of the | tower to you? | .1405 / 14.05%"},{"unit":"Unit 1 \u2014 Overview & Math","slide":98,"title":"Review","text":"Review | Identify units of measurement used when conducting SAAZA | Unit used for measuring visibility | Statute Miles | Units used for measuring distances | Feet | Meters | Nautical Miles"},{"unit":"Unit 1 \u2014 Overview & Math","slide":99,"title":"Review","text":"Review | Convert horizontal units of measurement | How many feet is the tower from your position? | 12,775.6\u2019 | How many Statute Miles is it? | 2.41 SM | How many Nautical Miles is it? | 2.10 NM | What is your elevation in meters? | 663.11 m"},{"unit":"Unit 1 \u2014 Overview & Math","slide":100,"title":"Outline","text":"Outline | Mathematics | Measurement | Review | Summary"},{"unit":"Unit 1 \u2014 Overview & Math","slide":101,"title":"Summary","text":"Summary | Mathematics | Measurement"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":4,"title":"Drop Zone Criteria","text":"Drop Zone Criteria | GySgt J. W. \u201cChad\u201d Kamphuis"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":5,"title":"Purpose","text":"Purpose | The purpose of this course is to prospective graduates on required criteria for a Landing Zone to be considered usable during Survey and Assault Zone Assessment (SAAZA)."},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":6,"title":"Learning Objectives","text":"Learning Objectives | Identify the dimensions of the imaginary surface, to include slope ratio | Identify the required criteria for an DZ"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":7,"title":"References","text":"References | UFC 3-260-1 Airfield and Heliport Planning and Design | TM 3-34.48-2 Theater of\u00a0Operations:\u00a0Roads, Airfields, and\u00a0Heliports- Airfield and\u00a0Heliport Design | DAFMAN 13-217 Nuclear, Space, Missile, Command and Control; Drop Zone Landing Zone and Helicopter Landing Zone Procedures"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":8,"title":"References","text":"References | Engineering Technical Letter (ETL) 09-6 (17 Aug 09) | Engineering Technical Letter 02-19 (12 Nov 02)"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":9,"title":"Outline","text":"Outline | Drop Zone (DZ) | Review | Summary"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":10,"title":"Outline","text":"Outline | Drop Zone (DZ) | Summary"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":11,"title":"Drop Zone","text":"Drop Zone | Anatomy of a standard DZ | DZ survey is three dimensional | Leading Edge | Trailing Edge | Point of Impact (PI) / Center | DZ Axis | 600 yds | 600 yds"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":12,"title":"Drop Zone","text":"Drop Zone | Minimum criteria is based on mission type | Container Delivery System (CDS) | (400 yds width x 400 yds length x 600 ft altitude) | Personnel | (600 yds width x 600 yds length x 1000 ft altitude) | Heavy Equipment | (600 yds width x 1000 yds length x 1100 ft altitude)"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":13,"title":"Drop Zone","text":"Drop Zone | Criteria adjustments are based on mission specific information, and are cumulative | Adjustments are made half to each side or end of a DZ, unless indicated | Adjustment requires +200 yds width | 100 yds to each side"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":14,"title":"Drop Zone","text":"Drop Zone | Personnel (600 x 600 x 1000) | Add 75 yds to trailing edge for each jumper >1 | For each 100 ft above 1000 ft, add 30 yds to length / width | Sunset to sunrise, add 100 yds to length | Day formations / night single, add 100 yds to width only | Night formation, add 200 yds to width only | GPS drops, add 400 yds to width, (exclude formation and night)"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":15,"title":"Drop Zones","text":"Drop Zones | CDS (400 x 400 x 600) | Length based on number of containers | Day formations, add 100 yds to length / width | Sunset to sunrise, 100 yds for single / 200 yds for formation | For each 100 ft above 600 ft, add 40 yds | GPS, add 200 yds (exclude formation / night)"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":16,"title":"Drop Zone","text":"Drop Zone | Heavy Equipment (600 x 1000 x 1100) | Add 400 yds to length for each platform >1 | For each 100 ft above 1100 ft, add 30 yds to the width and length | Sunset to sunrise, add 100 yds to length | Day formation / night single, add 100 yds to width | Night formation, add 200 yds to width only | GPS drops, add 400 yds to width (exclude formation and night)"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":17,"title":"Point of Impact","text":"Point of Impact"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":18,"title":"Minimum PI Placement","text":"Minimum PI Placement | Night Example | PI | CDS PI | 250 Yds | PI | PE PI | 350 Yds | PI | HE PI | 550 Yds | LE | Direction | of Flight | TE"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":19,"title":"Drop Zone","text":"Drop Zone | \u201cMANFAS\u201d method | Minimums | Altitude | Night | Formations | Additional | Safety | Width | Length | M | A | F | A | S | N | KC-130 dropping 12 jumper in 3 passes of 4 from 1500 ft at 1700L | 600 yds | 600 yds | 150 yds | 150 yds | N/A | N/A | N/A | N/A | N/A | N/A | N/A | 225 yds | Minimum 750 x 975 yds required"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":20,"title":"Drop Zone","text":"Drop Zone | KC-130 conducting drop of 3 HE platforms 1,700 ft at 2330L | Width | Length | M | A | F | A | S | N"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":21,"title":"Drop Zone","text":"Drop Zone | KC-130 conducting drop of 3 HE platforms 1,700 ft at 2330L | Width | Length | M | A | F | A | S | N | 1000 yds | 600 yds | 280 yds | 100 yds | N/A | N/A | N/A | N/A | N/A | N/A | 100 yds | Minimum 980 x 1900 yds required | \u201ceach 100 ft above 1100 ft, add 30 yds to the width\u201d 6 x 30 yds | \u201cnight single, add | 100 yds to width\u201d | \u201cSunset to sunrise, add 100 yds to length\u201d | 800 yds | \u201cAdd 400 yds to length for each platform >1\u201d 400 x2"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":22,"title":"Drop Zone","text":"Drop Zone | KC-130 conducting drop of 3 HE platforms 1,700 ft at 2330L | Width | Length | M | A | F | A | S | N | 1000 yds | 600 yds | 180 yds | 100 yds | 180 yds | N/A | N/A | N/A | N/A | N/A | 100 yds | Minimum 880 x 2080 yds required | \u201ceach 100 ft above 1100 ft, add 30 yds to the width and length\u201d 6 x 30 yds | \u201cnight single, add | 100 yds to width\u201d | \u201cSunset to sunrise, add 100 yds to length\u201d | 800 yds | \u201cAdd 400 yds to length for each platform >1\u201d 400 x2"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":23,"title":"Drop Zone","text":"Drop Zone | Circular Drop Zones | Center and radius is determined by mission requirements | PI normally center for multiple run-in headings | PI | Center"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":24,"title":"Drop Zone","text":"Drop Zone | Circular Drop Zones | Previously surveyed DZ | Mission specific DZ | PI | PI"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":25,"title":"Break","text":"Break | MAGTAB"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":26,"title":"Outline","text":"Outline | Drop Zone (DZ) | Summary"},{"unit":"Unit 2.1 \u2014 Drop Zone Criteria","slide":27,"title":"Summary","text":"Summary | Drop Zone (DZ)"},{"unit": tep 1: Divide the airfield into sections | Inspect the airfield | Divide the entire field into features and sections. | Each section should be 250 feet long and the width of the runway or taxiway. The hammerheads and overruns should each be a section | As a minimum for contingency operations, sections should be located in the touchdown area, primary braking area, point of aircraft rotation and the last 500 feet of the runway | All information pulled from ETL 97-9 and AFCEC"},{"unit":"Unit 3 \u2014 SPACI","slide":5,"title":"5","text":"5 | Step 2: Inspect Airfield And Identify Stresses | Conduct as detailed and accurate an inspection as time and conditions permit | There are eight possible problems or distresses | Potholes, Ruts, Loose aggregate size, Loose aggregate coverage (added), Dust, Rolling resistant material, Jet blast erosion, and Stabilized layer failure | In each section you may have no distresses or multiple | If unable to determine the type of distress, make a reasonable guess"},{"unit":"Unit 3 \u2014 SPACI","slide":6,"title":"Distress Severity Levels for C-17 Semi-prepared Surfaces","text":"Distress Severity Levels for C-17 Semi-prepared Surfaces | Distress Types | 91  Potholes | 92  Ruts | 93  Loose Agg. | Coverage | 94  Dust | 95  Rolling | Resistant Mat. | 96  Jet Blast | Erosion | 97  Stabilized | Layer Failure | GREEN | RED | 4\u201d Deep and/or | <15\u201d Diameter | 4\u201d to 9\u201d Deep and | >15\u201d Diameter | > 9\u201d Deep and | >15\u201d Diameter | Exist but < 4\u201d Deep | 4\u201d to 9\u201d Deep | AMBER | >9\u201d Deep | Covers < 1/10 of section | Covers between 1/10 and 1/2 | of section | Covers > 1/2 of section | Does not obstruct visibility | Partially obstructs visibility | Thick, obstructs visibility | Exist but < 3.5\u201d Deep | 3.5\u201d to 7.75\u201d Deep | > 7.75\u201d Deep | Exist but < 1\u201d Deep | 1\u201d to 2\u201d Deep | > 2\u201d Deep | Exist but < 1\u201d Deep | 1\u201d to 3\u201d Deep | > 3\u201d Deep | Note: Potholes, ruts, and rolling resistant material are considered major distresses.  Depending | upon actual distress location, any of these distress types categorized as RED may cause overall | airfield condition to be RED. | Training sites must meet green criteria, Contingency sites must meet yellow criteria | 93  Loose Agg. | Size | Max. \u00be\u201d, Recommended \u00bd\u201d | Max. \u00be\u201d to 1\u201d | Max. >1\u201d | Surface Condition | C-17 Semi-prepared Surfaces"},{"unit":"Unit 3 \u2014 SPACI","slide":7,"title":"Distress Severity Levels for C-130 Semi-prepared Surfaces","text":"Distress Severity Levels for C-130 Semi-prepared Surfaces | Distress Types | 91  Potholes | 92  Ruts | 93  Loose Agg. | Coverage | 94  Dust | 95  Rolling | Resistant Mat. | 96  Jet Blast | Erosion | 97  Stabilized | Layer Failure | GREEN | RED | 4\u201d Deep and/or | <15\u201d Diameter | 4\u201d to 6\u201d Deep and | >15\u201d Diameter | > 6\u201d Deep and | >15\u201d Diameter | Exist but < 4\u201d Deep | 4\u201d to 6\u201d Deep | AMBER | >6\u201d Deep | Covers < 1/10 of section | Covers between 1/10 and 1/2 | of section | Covers > 1/2 of section | Does not obstruct visibility | Partially obstructs visibility | Thick, obstructs visibility | Exist but < 1\u201d Deep | 1\u201d to 3\u201d Deep | > 3\u201d Deep | Exist but < 1\u201d Deep | 1\u201d to 2\u201d Deep | > 2\u201d Deep | Exist but < 1\u201d Deep | 1\u201d to 3\u201d Deep | > 3\u201d Deep | Note: Potholes, ruts, and rolling resistant material are considered major distresses.  Depending | upon actual distress location, any of these distress types categorized as RED may cause overall | airfield condition to be RED. | Training sites must meet green criteria, Contingency sites must meet yellow criteria | 93  Loose Agg. | Size | Max. \u00be\u201d, Recommended \u00bd\u201d | Max. \u00be\u201d to 1\u201d | Max. >1\u201d | Surface Condition | C-130 Semi-prepared Surfaces"},{"unit":"Unit 3 \u2014 SPACI","slide":8,"title":"Note: Potholes, ruts, and rolling resistant material are considered major distresses.  Depending  upon actual distress location, any of these distress types categorized as RED may cause overall airfield condition to be RED.","text":"Note: Potholes, ruts, and rolling resistant material are considered major distresses.  Depending  upon actual distress location, any of these distress types categorized as RED may cause overall airfield condition to be RED. | Training sites must meet green criteria, Contingency sites must meet yellow criteria. | Surface Condition | C-146 and LTFW Semi-prepared Surfaces | Partially Obstructs Visibility | Thick, Obscures visibility"},{"unit":"Unit 3 \u2014 SPACI","slide":9,"title":"91. Potholes","text":"91. Potholes | 9 | Potholes are bowl-shaped depressions in the surface. | Once formed, they will continue to disintegrate. | If potholes have hard, abrupt, vertical sides, refer to stabilized layer failure criteria. | Measure the depth of the biggest potholes and determine their severity level. | < 4 Inches Deep | < 15 Inches Diameter | GREEN | 4 to 9 Inches Deep | > 15 Inches Diameter | AMBER | > 9 Inches Deep | > 15 Inches Diameter | RED | C-17 | C-130 | < 4 Inches Deep | < 15 Inches Diameter | 4 to 6 Inches Deep | > 15 Inches Diameter | > 6 Inches Deep | > 15 Inches Diameter"},{"unit":"Unit 3 \u2014 SPACI","slide":10,"title":"Ruts are surface depressions in the wheel paths that run parallel to the centerline. They result from repeated aircraft passes and become more severe with time.","text":"Ruts are surface depressions in the wheel paths that run parallel to the centerline. They result from repeated aircraft passes and become more severe with time. | Check Rut Depths at touchdown, braking area, turn around, and point of rotation | Lay a straightedge across the ruts with both ends resting on the solid runway surface with loose (rolling resistant material) removed. Measure the average depth of the three deepest ruts on each side, from the bottom of the straightedge to the solid ground in the bottom of the rut. Use the higher average(left or right) depth for that location. Rut width does not affect severity. | 92. Ruts | 10 | Runway Maximum Rut Depth = ______ | Location 1 | Measurements | 1. ____ | 2. ____ | 3. ____ | 4. ____ | 5. ____ | 6. ____ | Location 2 | Measurements | 1. ____ | 2. ____ | 3. ____ | 4. ____ | 5. ____ | 6. ____ | Location 3 | Measurements | 1. ____ | 2. ____ | 3. ____ | 4. ____ | 5. ____ | 6. ____ | Location 4 | Measurements | 1. ____ | 2. ____ | 3. ____ | 4. ____ | 5. ____ | 6. ____ | Loc 1 Max= ____ | Loc 2 Max= ____ | Loc 3 Max= ____ | Loc 4 Max= ____ | Rut Depths | Operational | Code | Operational Code Description | >9\u2019\u2019 (C-17) | >6\u2019\u2019 (C-130) | 4\u2019\u2019 \u2013 9\u2019\u2019 (C-17) | 4\u2019\u2019 \u2013 6\u2019\u2019 (C-130) | Exist but < 4\u2019\u2019 | Red | Amber | Green | Operate Aircraft for a Limited Number of Operations. | Operate Aircraft for Unlimited Mission Operations. | Operate Aircraft Only in Emergency Situations."},{"unit":"Unit 3 \u2014 SPACI","slide":11,"title":"93. Loose Aggregate Coverage","text":"93. Loose Aggregate Coverage | Loose aggregate consists of small stones \u00bc-inch or larger that have separated from the soil binder. | In large enough quantities and sizes, it becomes dangerous. | Rocks over 4 inches in diameter must be removed from the airfield before any operations. | If material crushes underfoot, it is not considered loose aggregate | Estimate the area of the section that is covered by loose aggregate  assess appropriate severity | 11 | Maximum | Aggregate Coverage | Operational | Code | Operational Code Description | Covers > 1/2 of section | Covers between 1/10 and | 1/2 of the section | Covers < 1/10 of section | Red | Amber | Green | Operate Aircraft for a Limited Number of Operations. | Operate Aircraft for Unlimited Mission Operations. | Operate Aircraft Only in Emergency Situations."},{"unit":"Unit 3 \u2014 SPACI","slide":12,"title":"12","text":"12 | 93. Loose Aggregate Size | \u00be\u201d to 1\u201d  creates engine FOD potential, as well as probable damage to undercarriage antennae | Larger aggregate provides tire cutting potential as well as greater potential for undercarriage FOD damage | Recommend surface coarse gradation with maximum \u00bd\u201d aggregate size be used on LZs | Maximum | Aggregate Size | Operational | Code | Operational Code Description | > 1\u201d | 3/4\u201d - 1\u201d | < 3/4\u201d | Red | Amber | Green | Operate Aircraft for a Limited Number of Operations. | Operate Aircraft for Unlimited Mission Operations. | Operate Aircraft Only in Emergency Situations."},{"unit":"Unit 3 \u2014 SPACI","slide":13,"title":"Step 3: Calculating the Ratings","text":"Step 3: Calculating the Ratings | SPACI Example: | Potholes of Green severity on the runway, the deduct value is 4. | Ruts at Amber severity, the deduct value is 18. | Loose aggregate coverage at Green severity 4. | Loose aggregate size at Amber severity, the deduct value is 6. | Dust at Amber severity, the deduct value is 4. | Add all the distress values and record the total on the line labeled \u201cTotal deduct value.\u201d In this case, the total deduct value is 36. | Count the total number of distresses that have deduct values greater than 5. That is the q value. Record it on the line labeled q. For this example, q is 2. | 13"},{"unit":"Unit 3 \u2014 SPACI","slide":14,"title":"Step 3: Calculating the Ratings","text":"Step 3: Calculating the Ratings | 14 | On the SPACI curve locate the \u201cTotal Deduct Value.\u201d | Utilize the numbers on the bottom of the graph until you reach the total deduct value of 36. | Go up the vertical line until it intersects with the curved line that matches your q number (in this example, 2). From that point, follow the line across to the left to find the rating (the SPACI). For this example, the SPACI is 73. | Go to the SPACI scale which shows that 73 is in the Amber range. | Circle this overall rating on the bottom left of the inspection sheet. | SPACI Scale | Green | Amber | Red | 0 | 25 | 75 | 100"},{"unit":"Unit 3 \u2014 SPACI","slide":15,"title":"SPACI EXERCISE","text":"SPACI EXERCISE | C-17 operations: | 3\u2019\u2019 deep and 12\u2019\u2019 diameter potholes | 3\u2019\u2019 ruts | Partially obstructed dust | 1.5\u2019\u2019 deep Rolling Resistant Material | 4\u2019\u2019 deep Jet Blast Erosion | 1.5\u2019\u2019 deep Stabilized Layer Failure | C-130 operations: | 3.5\u2019\u2019 deep and 13\u2019\u2019 diameter potholes | Partially obstructed dust | 5\u2019\u2019 jet blast erosion | 1.5\u2019\u2019 stabilized layer failure | Results: | Deduct Value=65 / q=4 / SPACI=61 / Amber | Deduct Value=33 / q=2 / SPACI=76 / Green | 15"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":3,"title":"SAAZA Process","text":"SAAZA Process | GySgt J. W. \u201cChad\u201d Kamphuis"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":6,"title":"Purpose","text":"Purpose | The purpose of this presentation is to prepare prospective surveyors to properly execute all four phases of the SAAZA process."},{"unit":"Unit 4 \u2014 SAAZA Process","slide":7,"title":"Learning Objectives","text":"Learning Objectives | Identify the four phases of a survey | Identify key information and resources used during the information gathering phase | Identify planning considerations during the preparation phase | Identify priorities during the site visit | Identify the forms required to conduct final product development"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":8,"title":"References","text":"References | MMT TACSOP | UFC 3-260-1 Airfield and Heliport Planning and Design | TM 3-34.48-2 Theater of Operations:\u00a0Roads, Airfields, and Heliports- Airfield and\u00a0Heliport Design\u200b | DAFMAN 13-217 Nuclear, Space, Missile, Command and Control; Drop Zone Landing Zone and Helicopter Landing Zone Procedures"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":9,"title":"References","text":"References | Engineering Technical Letter (ETL) 09-6 (17 Aug 09) | TSPWG 3-260-03.02-19 Tri-Service\u00a0Pavements Working Group (TSPWG)\u00a0Manual. Airfield Pavement Evaluation\u00a0Standards and Procedures\u200b"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":10,"title":"Outline","text":"Outline | Introduction / Overview | Unit One: Mathematics and Measurement | Unit Two: Landing Zone Criteria | Unit Three: Soil Identification and Evaluation | Unit Four: SAAZA Process | Unit Five: SAAZA Completion"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":11,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":12,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":14,"title":"Overview","text":"Overview | Survey is a process | Planning and preparation is essential | Physical survey is the simplest portion | Everything is invisible except the final product | The Seven \u201cP\u201d Rule"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":15,"title":"Overview","text":"Overview | Four phases | Information Gathering | Collection and consolidation of all pre-existing information on a particular location | Preparation | Team planning, task assignment, logistics | Site Visit | Physical collection of ground truth data | Final Product Development | Synthesis of all data points into cohesive and informative document for requesting agency"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":16,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":17,"title":"Information Gathering","text":"Information Gathering | SAAZA | FOR | DUMMIES"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":18,"title":"Information Gathering","text":"Information Gathering | Existing information assists in creating an efficient and effective collection plan for the Site Visit | Creates priorities to fill in gaps in information | Information must still be validated | Provides a good indicator of the amount of collection required to accomplish the mission"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":19,"title":"Information Gathering","text":"Information Gathering | Previously completed surveys | Satellite imagery | Maps | ATC supplemental info | Weather reports | Intelligence reports | Host Nation (HN) points of contact for controlling agencies | Requestor criteria | Available assets"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":20,"title":"Information Gathering","text":"Information Gathering | Previously completed surveys | Best source of info for a specific location | May still be current | Will outline previous areas of concern | Talon Point and the Zone Availability Reports (ZARs) | NIPR | https://talonpoint.net/ | SIPR | https://talonpoint.snlca.nro.smil.mil/TalonPoint/home"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":21,"title":"Information Gathering","text":"Information Gathering | Satellite Imagery | S-2 Products | Google Earth | HAWG-VIEW | Maps | Airspace | Range | Road / relief"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":22,"title":"Information Gathering","text":"Information Gathering | Intelligence reports | Security concerns | ATC supplemental information | Factors that affect ATC operations | National Geospatial Agency (NGA) | Weather reports | Host Nation (HN) points of contact for controlling agencies"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":23,"title":"Information Gathering","text":"Information Gathering | Requestor criteria | Ensure you have all T/M/S specific criteria information found in NATOPS Manuals | Glideslopes | Gradients | Airframe mission weight for fixed-wing | LZ size requirements | Supplemental requests | Your assessment depends on this information"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":24,"title":"Information Gathering","text":"Information Gathering | Available assets | Logistics | Air or Ground Insert | Required life support for time on station | Personnel | EAF integration | Security attachment | Equipment"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":25,"title":"Information Gathering","text":"Information Gathering | Transitioning to preparation | Determine what information you have to determine what information you do not have | Prioritize missing information and make a list of necessary tasks to accomplish the mission"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":26,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":27,"title":"Preparation","text":"Preparation | A team leader prepares the team for mission success through detailed planning"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":28,"title":"Preparation","text":"Preparation | Mission requirements | Limitations | Available assets | Task organization | Mission briefing | Rehearsals | Equipment | Staging"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":29,"title":"Preparation","text":"Preparation | Mission requirements | LZ purpose (ALZ, HLZ, FARP, etc) | Requesting agency (T/M/S) | Supplemental requests"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":30,"title":"Preparation","text":"Preparation | Limitations | Time (including time of day) | Personnel | Security concerns"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":31,"title":"Preparation","text":"Preparation | Available assets | Ground or Air insert | EAF personnel | Security personnel"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":32,"title":"Preparation","text":"Preparation | Task organization | Specific tasking for every member | Primary, secondary, tertiary tasks | Integrate EAF / security personnel"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":33,"title":"Preparation","text":"Preparation | Mission briefing | Team Leader must paint a clear and concise picture of the ground scheme of maneuver to every member and all integrated personnel | Especially important if there is a time constraint | Clear expectations of outputs"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":34,"title":"Preparation","text":"Preparation | Rehearsals | Time permitting, Team Leaders should walk their team and integrated personnel through the scheme of maneuver | Builds confidence and understanding"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":35,"title":"Preparation","text":"Preparation | Equipment | Function check all equipment | Pack out individual requirements"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":36,"title":"Preparation","text":"Preparation | Staging | Mission has been planned, briefed, rehearsed, and equipped | Stage for embark and departure"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":37,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":38,"title":"Site Visit","text":"Site Visit"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":39,"title":"Site Visit","text":"Site Visit | This is the simplest phase of the process | Just execute your plan\u2026 | Collect data properly | \u2026and get out | Phase where errors have the potential to create critical failures | Unlikely to get a second chance | Bad data = bad survey | Bad survey = loss of confidence"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":40,"title":"Site Visit","text":"Site Visit | Time | Scope | Manpower | Equipment"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":41,"title":"Site Visit","text":"Site Visit | Time | Most critical limitation | Defines the scope of the survey | Hasty Survey and Assessment <6 hours | Full Survey and Assessment \u226512 hours"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":42,"title":"Site Visit","text":"Site Visit | Scope | Hasty | Will focus on presence of minimum criteria only | Specific to T/M/S | Full | Provide maximum ground truth data | Still specific to T/M/S | Provides enough information to tailor to other T/M/S if needed"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":43,"title":"Site Visit","text":"Site Visit | Manpower | Supervision of all members and integrated personnel | Ensure the plan is executed as briefed, or adjusted as necessary | Participation | The Team Leader is not solely a supervisor during survey and assessment"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":44,"title":"Site Visit","text":"Site Visit | Equipment | Accountability of gear at all times! | A DCP cone is an indicator, to the enemy"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":45,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":46,"title":"Final Product Development","text":"Final Product Development"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":47,"title":"Final Product Development","text":"Final Product Development | Data analysis and synthesis | Product refinement | Survey forms"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":48,"title":"Final Product Development","text":"Final Product Development | Data analysis and synthesis | Compile information from all sources and condense into requirements | ALZ soil evaluation | 37 DCP test locations, 3 layers per test location | 111 CBR calculations | 1 controlling test location with 3 CBR calculations | 1 controlling layer with 1 CBR rating | 1 answer for number of allowable passes"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":49,"title":"Final Product Development","text":"Final Product Development | Data analysis and synthesis | Gradients require calculations | ALZ gradients | 150 20\u2019 longitudinal gradient readings | 15 200\u2019 averages calculated | 1 3000\u2019 average calculated | 28 15\u2019 transverse gradient readings | 7 60\u2019 averages calculated"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":50,"title":"Final Product Development","text":"Final Product Development | Data analysis and synthesis | HLZ gradients | Number of readings depends on HLZ size | Required to gather longitudinal and transverse"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":51,"title":"Final Product Development","text":"Final Product Development | Data analysis and synthesis | Surfaces | Imaginary surface info | Obstacle data | Trigonometry"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":52,"title":"Final Product Development","text":"Final Product Development | Product refinement | LZ diagram | Pictures | Survey forms"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":53,"title":"Final Product Development","text":"Final Product Development | Survey Forms | Fixed-wing (ALZ): AF IRT 3822 | Helicopter / Tilt-rotor (HLZ): AF IRT 4303"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":54,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":55,"title":"Review","text":"Review | Identify the four phases of a survey | Information Gathering | Collection and consolidation of all pre-existing information on a particular location | Preparation | Team planning, task assignment, logisitcs | Site Visit | Physical collection of ground truth data | Final Product Development | Synthesis of all data points into cohesive and informative document for requesting agency"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":56,"title":"Review","text":"Review | Identify key information and resources used during the information gathering phase | Talon Point | Satellite Imagery | Maps | Intel reports | HN support | T/M/S NATOPS | ATC supplemental info"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":57,"title":"Review","text":"Review | Identify planning considerations during the preparation phase | Mission requirements | Limitations | Available assets | Task organization | Mission briefing | Rehearsals | Equipment | Staging"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":58,"title":"Review","text":"Review | Identify priorities during the site visit | Time | Determines scope | Scope | Hasty vs. Full | Manpower | Supervision and execution | Equipment | Accountability"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":59,"title":"Review","text":"Review | Identify the forms required to conduct final product development | Fixed-wing (ALZ): AF IRT 3822 | Helicopter / Tilt-rotor (HLZ): AF IRT 4303"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":60,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development | Review | Summary"},{"unit":"Unit 4 \u2014 SAAZA Process","slide":61,"title":"Outline","text":"Outline | Overview | Information Gathering | Preparation | Site Visit | Final Product Development"},{"unit":"Unit 5 \u2014 Completion","slide":3,"title":"SAAZA Unit 5:","text":"SAAZA Unit 5: | SAAZA Completion | GySgt J. W. \u201cChad\u201d Kamphuis"},{"unit":"Unit 5 \u2014 Completion","slide":4,"title":"Purpose","text":"Purpose | The purpose of this presentation is to guide prospective MMTIs on the preparation and submission of final survey products for review, approval, and database inclusion."},{"unit":"Unit 5 \u2014 Completion","slide":5,"title":"Learning Objectives","text":"Learning Objectives | Identify the required items to complete the AF IMT 3822, Landing Zone Survey Form | Identify the required items to complete the AF IMT 4303, Helicopter Landing Zone Form | Describe submission procedures for MAJCOM approval of SAAZA forms | Describe submission procedures for inclusion in SAAZA databases"},{"unit":"Unit 5 \u2014 Completion","slide":6,"title":"References","text":"References | DAFMAN 13-217 Nuclear, Space, Missile, Command and Control; Drop Zone var PDF={"Unit 1 \u2014 Overview & Math": "slides/slides_unit1.pdf", "Unit 2.1 \u2014 Drop Zone Criteria": "slides/slides_unit2_1.pdf", "Unit 2.2 \u2014 Helicopter LZ Criteria": "slides/slides_unit2_2.pdf", "Unit 2.3 \u2014 ALZ Fixed Wing Criteria": "slides/slides_unit2_3.pdf", "Unit 3 \u2014 Soil Identification & Evaluation": "slides/slides_unit3_soil.pdf", "Unit 3 \u2014 SPACI": "slides/slides_unit3_spaci.pdf", "Unit 4 \u2014 SAAZA Process": "slides/slides_unit4.pdf", "Unit 5 \u2014 Completion": "slides/slides_unit5.pdf"};
var UNITS=["All","Unit 1 — Overview & Math","Unit 2.1 — Drop Zone Criteria","Unit 2.2 — Helicopter LZ Criteria","Unit 2.3 — ALZ Fixed Wing Criteria","Unit 3 — Soil Identification & Evaluation","Unit 3 — SPACI","Unit 4 — SAAZA Process","Unit 5 — Completion"];
var activeUnit="All";

var fWrap=document.getElementById("filters");
UNITS.forEach(function(u){
  var b=document.createElement("button");
  b.className="fb"+(u==="All"?" on":"");
  b.textContent=u;
  b.onclick=function(){
    activeUnit=u;
    document.querySelectorAll(".fb").forEach(function(x){x.classList.remove("on");});
    b.classList.add("on");
    search();updateURL();
  };
  fWrap.appendChild(b);
});

window.addEventListener("load",function(){
  var params=new URLSearchParams(window.location.search);
  var q=params.get("q")||"";
  var unit=params.get("unit")||"All";
  if(q){document.getElementById("q").value=q;document.getElementById("clear-btn").style.display="block";}
  if(unit&&unit!=="All"){
    activeUnit=unit;
    document.querySelectorAll(".fb").forEach(function(b){b.classList.toggle("on",b.textContent===unit);});
  }
  if(q)search();
});

function updateURL(){
  var q=document.getElementById("q").value.trim();
  var params=new URLSearchParams();
  if(q)params.set("q",q);
  if(activeUnit!=="All")params.set("unit",activeUnit);
  history.replaceState(null,"",window.location.pathname+(params.toString()?"?"+params.toString():""));
}

function onInput(){
  var q=document.getElementById("q").value;
  document.getElementById("clear-btn").style.display=q?"block":"none";
  search();updateURL();
}

function clearSearch(){
  document.getElementById("q").value="";
  document.getElementById("clear-btn").style.display="none";
  document.getElementById("results").innerHTML='<div class="empty">Enter a search term to search all course slides</div>';
  document.getElementById("meta").textContent="";
  updateURL();
}

function esc(s){return s.replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function highlight(text,terms){
  var out=esc(text);
  terms.forEach(function(t){
    if(!t)return;
    out=out.replace(new RegExp("("+t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>");
  });
  return out;
}

function fullText(text){
  return text.replace(/\s*\|\s*/g,"\n");
}

function excerpt(text,terms){
  var lower=text.toLowerCase();
  var best=0;
  terms.forEach(function(t){var i=lower.indexOf(t.toLowerCase());if(i>0)best=Math.max(0,i-60);});
  var snip=text.substr(best,200);
  if(best>0)snip="..."+snip;
  if(best+200<text.length)snip+="...";
  return snip;
}

function toggleResult(el){el.classList.toggle("open");}

function search(){
  var q=document.getElementById("q").value.trim();
  var res=document.getElementById("results");
  var meta=document.getElementById("meta");
  if(q.length<2){
    res.innerHTML='<div class="empty">Enter a search term to search all course slides</div>';
    meta.textContent="";return;
  }
  var terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  var matches=[];
  for(var i=0;i<IDX.length;i++){
    var item=IDX[i];
    if(activeUnit!=="All"&&item.unit!==activeUnit)continue;
    var lower=item.text.toLowerCase();
    var score=0,allMatch=true;
    for(var j=0;j<terms.length;j++){
      var t=terms[j];
      if(lower.indexOf(t)===-1){allMatch=false;break;}
      var cnt=(lower.match(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"))||[]).length;
      score+=cnt;
      if(item.title.toLowerCase().indexOf(t)!==-1)score+=5;
    }
    if(allMatch)matches.push({item:item,score:score});
  }
  matches.sort(function(a,b){return b.score-a.score;});
  var top=matches.slice(0,60);
  meta.textContent=matches.length+" result"+(matches.length!==1?"s":"")+" found"+(top.length<matches.length?" — showing top 60":"");
  if(top.length===0){res.innerHTML='<div class="empty">No results found — try different keywords</div>';return;}
  var html="";
  top.forEach(function(m,idx){
    var pdfFile=PDF[m.item.unit]||"";
    var pdfLink=pdfFile+"#page="+m.item.slide;
    var full=fullText(m.item.text);
    html+='<div class="result" id="r'+idx+'">';
    html+='<div class="result-summary" onclick="toggleResult(document.getElementById('+"'r"+idx+"'"+'))">';
    html+='<div class="result-header"><span class="result-unit">'+esc(m.item.unit)+'</span><div class="result-meta"><span class="result-slide">Slide '+m.item.slide+'</span><span class="result-chevron">▼</span></div></div>';
    html+='<div class="result-title">'+highlight(m.item.title,terms)+'</div>';
    html+='<div class="result-excerpt">'+highlight(excerpt(m.item.text,terms),terms)+'</div>';
    html+='</div>';
    html+='<div class="result-full">';
    html+='<a class="slide-link" href="'+pdfLink+'" target="_blank"><span class="slide-link-label">📄 View actual slide</span><span class="slide-link-sub">Opens near slide '+m.item.slide+' →</span></a>';
    html+='<div class="result-full-body"><div class="result-full-label">Slide content</div><div class="result-full-text">'+highlight(full,terms)+'</div></div>';
    html+='</div></div>';
  });
  res.innerHTML=html;
}
</script>
