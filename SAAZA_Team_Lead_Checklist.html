<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAAZA Team Lead Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#f4f4f0;color:#1a1a1a;padding:1rem;min-height:100vh}
a.back{display:inline-block;font-size:12px;color:#1D9E75;text-decoration:none;margin-bottom:12px}
h1{font-size:20px;font-weight:600;margin-bottom:2px}
.sub{font-size:13px;color:#666;margin-bottom:1rem;line-height:1.5}
.overall{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:12px 14px;margin-bottom:12px}
.overall-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.overall-top .lbl{font-size:13px;font-weight:600}
.overall-top .pct{font-size:13px;font-weight:700;color:#0F6E56}
.bar{height:8px;background:#e8e8e4;border-radius:5px;overflow:hidden}
.fill{height:100%;background:#1D9E75;border-radius:5px;transition:width .3s}
.tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.tab{flex:1;min-width:74px;padding:9px 6px;border:1px solid #ccc;border-radius:9px;background:#fff;cursor:pointer;font-size:12px;color:#555;font-weight:500;text-align:center;white-space:nowrap}
.tab.on{background:#1D9E75;color:#fff;border-color:#1D9E75}
.tab .tn{font-size:10px;opacity:.8;display:block}
.phase-head{font-size:13px;color:#666;line-height:1.5;margin-bottom:12px;background:#EEF6FB;border-left:3px solid #0C6CB8;padding:9px 12px;border-radius:0 8px 8px 0;color:#0C447C}
.task{background:#fff;border:1px solid #e0e0e0;border-radius:11px;padding:12px 13px;margin-bottom:9px;transition:border-color .15s}
.task.done{border-color:#9ccb6e;background:#FBFEF8}
.task-top{display:flex;align-items:flex-start;gap:11px;cursor:pointer}
.checkbox{flex-shrink:0;width:24px;height:24px;border:2px solid #ccc;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;margin-top:1px;transition:all .15s}
.task.done .checkbox{background:#2E9B4F;border-color:#2E9B4F}
.task-body{flex:1}
.task-name{font-size:14px;font-weight:600;line-height:1.4}
.task.done .task-name{color:#5a7a3f}
.task-detail{font-size:12px;color:#777;line-height:1.55;margin-top:4px}
.task-notes{margin-top:9px}
.task-notes textarea{width:100%;border:1px solid #e0e0e0;border-radius:7px;padding:7px 9px;font-size:12.5px;font-family:inherit;resize:vertical;min-height:34px;color:#333;background:#fafafa}
.task-notes textarea:focus{outline:none;border-color:#1D9E75;background:#fff}
.notes-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.toolbar{display:flex;gap:8px;margin-top:14px;margin-bottom:4px}
.tb-btn{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;background:#fff;cursor:pointer;font-size:12.5px;color:#555;font-weight:500}
.tb-btn.danger{color:#a33}
.saved-tag{font-size:11px;color:#9a9a9a;text-align:center;margin-top:10px}
.footer{text-align:center;font-size:11px;color:#aaa;margin-top:1.5rem;padding-bottom:2rem}
</style>
</head>
<body>
<a class="back" href="index.html">&larr; Back to all tools</a>
<h1>Team Lead Checklist</h1>
<p class="sub">The 4-phase SAAZA process &mdash; tracks your progress through a survey from start to finish</p>

<div class="overall">
<div class="overall-top"><span class="lbl">Overall progress</span><span class="pct" id="overall-pct">0%</span></div>
<div class="bar"><div class="fill" id="overall-fill" style="width:0%"></div></div>
</div>

<div class="tabs" id="tabs"></div>
<div class="phase-head" id="phase-head"></div>
<div id="task-list"></div>

<div class="toolbar">
<button class="tb-btn" onclick="window.print()">🖨 Print</button>
<button class="tb-btn danger" onclick="resetAll()">↺ Reset all</button>
</div>
<div class="saved-tag" id="saved-tag">Progress saves automatically on this device</div>

<div class="footer">SAAZA Team Lead Checklist &mdash; 136CRF &mdash; based on Unit 4 (SAAZA Process) &middot; works offline</div>

<script>
var PHASES=[
 {key:"p1", tab:"Info", num:"Phase 1", title:"Information Gathering",
  head:"Collection and consolidation of all pre-existing information on the location. Build an efficient collection plan \u2014 everything still gets validated on site.",
  items:[
   ["Pull previously completed surveys","Talon Point / Zone Availability Reports (ZARs). NIPR: talonpoint.net \u2014 best single source; shows prior areas of concern."],
   ["Obtain satellite imagery","S-2 products, Google Earth, HAWG-VIEW."],
   ["Acquire maps","Record series, sheet number, edition, and date."],
   ["Gather ATC supplemental information","Airspace, frequencies, restrictions."],
   ["Obtain weather reports","Forecast and climatology for the window."],
   ["Review intelligence reports","Threat, terrain, recent activity."],
   ["Establish Host Nation (HN) POCs","Coordination and access."],
   ["Confirm requestor criteria (T/M/S)","NATOPS-specific: glideslopes, gradients, airframe mission weight (FW), LZ size requirements, supplemental requests. Your assessment depends on this."],
   ["Inventory available assets","Logistics (air/ground insert, life support), personnel (EAF integration, security), equipment."],
   ["Identify gaps & build collection plan","Determine what you HAVE to find what you DON'T \u2014 prioritize for the site visit."]
  ]},
 {key:"p2", tab:"Prep", num:"Phase 2", title:"Preparation",
  head:"Team planning, task assignment, and logistics. Proper Prior Planning Prevents Poor Performance \u2014 the physical survey is the simplest part if this is done well.",
  items:[
   ["Define mission requirements","LZ purpose (ALZ / HLZ / FARP), requesting agency (T/M/S), supplemental requests."],
   ["Identify limitations","Time (incl. time of day), personnel, security concerns."],
   ["Confirm available assets","Re-verify logistics, personnel, equipment for execution."],
   ["Task organization","Assign primary, secondary & tertiary tasks to every member; integrate EAF & security."],
   ["Conduct mission briefing","TL paints a clear, concise ground scheme of maneuver to ALL members & attachments; set output expectations."],
   ["Conduct rehearsals","Walk through tasks and contingencies."],
   ["Prepare & inventory equipment","LRF, DCP, clinometer, DAGR, line level, measuring wheel, compass, digital camera."],
   ["Plan staging","Insert/extract and on-site sequence."]
  ]},
 {key:"p3", tab:"Site", num:"Phase 3", title:"Site Visit",
  head:"Physical collection of ground truth data. Time defines the scope \u2014 you likely won't get a second chance. Bad data = bad survey = loss of confidence.",
  items:[
   ["Confirm time available \u2192 set scope","Hasty survey/assessment < 6 hr \u2022 Full survey/assessment \u2265 12 hr."],
   ["TL supervises AND participates","Not solely a supervisor; ensure the plan is executed as briefed, adjust as needed."],
   ["Verify / collect coordinates","WGS-84 via DAGR; lat/long to nearest 1/1000th minute."],
   ["Measure LZ / runway dimensions","Actual ground data in feet (not minimums)."],
   ["Conduct DCP testing (CBR)","36 in deep; 2 personnel; ~7 min/location. Prioritize touchdown, braking, turnaround, point of rotation, weak/wet/repaired areas."],
   ["Measure gradients","Longitudinal & transverse; carry +/\u2212 signs; line level (20 ft) or clinometer."],
   ["Identify obstacles & approach/departure","Glideslope ratios, radials, heights; recommend approach & departure axis; note restricted quadrants."],
   ["Conduct SPACI / surface assessment","8 distress types, section by section."],
   ["Photograph the site","Document surface, obstacles, features."],
   ["Maintain equipment accountability","At ALL times \u2014 a DCP cone is an indicator to the enemy."]
  ]},
 {key:"p4", tab:"Product", num:"Phase 4", title:"Final Product Development",
  head:"Synthesis of all data points into a cohesive, informative document for the requesting agency. Everything is invisible except the final product.",
  items:[
   ["Analyze & synthesize data","CBR: identify layers, average per layer, find the controlling (weakest) layer/location. Gradient averages (e.g. 150 readings \u2192 15\u00d7200 ft avgs \u2192 1 cumulative)."],
   ["Determine allowable passes","Driven by the weakest / controlling layer."],
   ["Refine product","LZ diagram (north arrow, scale, dimensions, obstacles w/ distances & heights), photographs."],
   ["Complete survey form","AF IMT 3822 (fixed-wing / ALZ) \u2022 AF IMT 4303 (helicopter / tilt-rotor HLZ)."],
   ["Quality control review","EAF OIC / MAW Rep checks the survey."],
   ["Submit via Talon Point routing","Survey \u2192 QC (EAF OIC) \u2192 MAG ASO/MAW DOS (Safety of Flight) \u2192 MAG CO/MAW CG (Approve/Disapprove)."]
  ]}
];

var KEY="saaza_tl_checklist_v1";
var state={};
function load(){ try{var s=localStorage.getItem(KEY); if(s)state=JSON.parse(s);}catch(e){state={};} }
function save(){ try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){ document.getElementById("saved-tag").textContent="(Progress can't be saved in this view \u2014 works when hosted online)"; } }

var active="p1";
function cid(p,i){return p+"_"+i;}

function buildTabs(){
 var h="";
 PHASES.forEach(function(p){
  h+='<button class="tab'+(p.key===active?" on":"")+'" onclick="setTab(\''+p.key+'\')"><span class="tn">'+p.num+'</span>'+p.tab+'</button>';
 });
 document.getElementById("tabs").innerHTML=h;
}
function setTab(k){active=k;buildTabs();render();}

function phaseProg(p){
 var done=0;
 p.items.forEach(function(_,i){ if(state[cid(p.key,i)] && state[cid(p.key,i)].done) done++; });
 return {done:done,total:p.items.length};
}

function render(){
 var p=PHASES.find(function(x){return x.key===active;});
 document.getElementById("phase-head").textContent=p.head;
 var h="";
 p.items.forEach(function(it,i){
  var id=cid(p.key,i);
  var st=state[id]||{done:false,notes:""};
  h+='<div class="task'+(st.done?" done":"")+'" id="task-'+id+'">'+
     '<div class="task-top" onclick="toggle(\''+id+'\')">'+
     '<div class="checkbox">'+(st.done?"\u2713":"")+'</div>'+
     '<div class="task-body"><div class="task-name">'+it[0]+'</div><div class="task-detail">'+it[1]+'</div></div>'+
     '</div>'+
     '<div class="task-notes"><div class="notes-label">Notes</div>'+
     '<textarea placeholder="Add notes, measurements, POCs\u2026" oninput="setNote(\''+id+'\',this.value)">'+(st.notes||"").replace(/</g,"&lt;")+'</textarea></div>'+
     '</div>';
 });
 document.getElementById("task-list").innerHTML=h;
 updateProgress();
}

function toggle(id){
 var st=state[id]||{done:false,notes:""};
 st.done=!st.done; state[id]=st; save();
 var el=document.getElementById("task-"+id);
 el.classList.toggle("done",st.done);
 el.querySelector(".checkbox").textContent=st.done?"\u2713":"";
 updateProgress();
}
function setNote(id,v){
 var st=state[id]||{done:false,notes:""};
 st.notes=v; state[id]=st; save();
}

function updateProgress(){
 var total=0,done=0;
 PHASES.forEach(function(p){ var pr=phaseProg(p); total+=pr.total; done+=pr.done; });
 var pct=total?Math.round(done/total*100):0;
 document.getElementById("overall-pct").textContent=pct+"%  ("+done+"/"+total+")";
 document.getElementById("overall-fill").style.width=pct+"%";
 // update tab labels with mini progress
 var tabs=document.querySelectorAll(".tab");
 PHASES.forEach(function(p,idx){
  var pr=phaseProg(p);
  var done=pr.done===pr.total&&pr.total>0;
  tabs[idx].querySelector(".tn").textContent=p.num+" "+pr.done+"/"+pr.total+(done?" \u2713":"");
 });
}

function resetAll(){
 if(confirm("Reset all checkboxes and notes? This cannot be undone.")){
  state={}; save(); render();
 }
}

load();
buildTabs();
render();
</script>
</body>
</html>
